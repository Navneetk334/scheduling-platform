name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dummy values so env validation / Prisma client generation succeed in CI.
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/scheduling?schema=public
  REDIS_URL: redis://localhost:6379
  BETTER_AUTH_SECRET: ci-secret-value-not-used-for-real-auth
  NEXT_PUBLIC_API_URL: http://localhost:4000

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @invincible/database db:generate

      - name: Build packages
        run: pnpm --filter "./packages/*" build

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint

      - name: Unit tests
        run: pnpm turbo run test

      - name: Build applications
        run: pnpm turbo run build

  docker:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
